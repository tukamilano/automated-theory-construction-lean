name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lean-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Build Lean project
        run: lake build

      - name: Verify Scratch.lean
        run: lake env lean AutomatedTheoryConstruction/Scratch.lean

      - name: Mock worker smoke test
        run: python3 scripts/run_loop.py --enable-worker --worker-command "python3 scripts/mock_worker.py" --max-iterations 1 --no-phase-logs
