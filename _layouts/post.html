---
layout: default
---
<article class="post">
  <header class="post-header">
    <p class="post-eyebrow">Blog Post</p>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%Y-%m-%d" }}
      </time>
    </p>
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>
